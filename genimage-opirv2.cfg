image opirv2-root.part {
    ext4 {}
    size = 50M
}

image opirv2-sdcard.img {
    hdimage {}
    partition bootinfo {
        in-partition-table = false
        offset = 0
        image = "bootinfo_sd.bin"
    }
    partition fsbl {
        in-partition-table = false
        offset = 131072
        image = "FSBL.bin"
    }
    partition env {
        in-partition-table = false
        offset = 393216
        image = "u-boot-env-default.bin"
    }
    partition uboot {
        in-partition-table = false
        offset = 851968
        image = "u-boot-opensbi.itb"
    }
    partition root {
        partition-type = 0x83
        offset = 31457280
        image = "opirv2-root.part"
    }
}
